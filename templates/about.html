<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我介紹</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
.section-title {
    color: #fff;
    margin-top: 2rem;
    text-shadow: 0 4px 24px rgba(0,0,0,0.45), 0 1px 0 #232946;
    letter-spacing: 2px;
}
.info-list { margin-bottom: 1.5rem; }
.info-list li { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="aurora aurora-blue"></div>
    <div class="aurora aurora-purple"></div>
    <div class="bg-glass-noise"></div>
    {% include 'navbar.html' %}
    <div class="container">
        <div class="main-section">
            <h1 class="text-center mb-4">自我介紹</h1>
            <div class="row align-items-center mb-5">
                <div class="col-md-4 text-center mb-3 mb-md-0">
                    <img src="/static/img/avatar.png" alt="avatar" style="width: 120px; border-radius: 50%; box-shadow: 0 2px 8px #bbb;">
                </div>
                <div class="col-md-8">
                    <h2 class="section-title" style="margin-top:0;">關於我</h2>
                    <p style="font-size:1.15rem; color:#F3F4F6;">
                        <br>大家好，我是劉振銘。
                        我想看到左邊就知道我是怎樣的人了。<br/>
                        <br>除此以外，還會看些新東西。然後對於資訊的東西會小碰一下<br/>
                    </p>
                </div>
            </div>
            <div class="mb-4">
                <h2 class="section-title">個人技能</h2>
                <div class="row g-4">
                    <div class="col-6 col-md-3 text-center">
                        <a href="https://www.python.org/" target="_blank" rel="noopener">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" alt="Python" style="width:48px;">
                        </a>
                        <div style="margin-top:8px; font-weight:bold; color:#fff;">Python</div>
                        <div style="font-size:0.95rem; color:#e0e0e0;">寫自動化、資料分析、AI 都靠它</div>
                    </div>
                    <div class="col-6 col-md-3 text-center">
                        <a href="https://github.com/" target="_blank" rel="noopener">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub" style="width:48px; background:#fff; border-radius:50%;">
                        </a>
                        <div style="margin-top:8px; font-weight:bold; color:#fff;">GitHub</div>
                        <div style="font-size:0.95rem; color:#e0e0e0;">版本控管、團隊協作都靠它</div>
                    </div>
                    <div class="col-6 col-md-3 text-center">
                        <a href="https://docs.conda.io/en/latest/miniconda.html" target="_blank" rel="noopener">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/anaconda/anaconda-original.svg" alt="MiniConda" style="width:48px;">
                        </a>
                        <div style="margin-top:8px; font-weight:bold; color:#fff;">MiniConda</div>
                        <div style="font-size:0.95rem; color:#e0e0e0;">管理 Python 環境超方便</div>
                    </div>
                    <div class="col-6 col-md-3 text-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/2721/2721297.png" alt="AI/ML" style="width:48px;">
                        <div style="margin-top:8px; font-weight:bold; color:#fff;">AI / 機器學習</div>
                        <div style="font-size:0.95rem; color:#e0e0e0;">有玩過一些模型和應用</div>
                    </div>
                </div>
            </div>
            <div class="mt-5 text-center" style="color:#bdbdbd; font-size:1rem;">
                <span>如果你對我的技能或經歷有興趣，歡迎隨時交流！</span>
            </div>
        </div>
    </div>
</body>
</html>
